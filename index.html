<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Rotina da Teba ♡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Rubik:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --cream: #fdf6ec;
      --cream-2: #f6ecd9;
      --pink: #f2a9cf;
      --pink-l: #fbdbe9;
      --pink-xl: #fdeef5;
      --pink-d: #d77aab;
      --pink-deeper: #a84a7d;
      --lilac: #ca9fdd;
      --lilac-l: #e6d2f0;
      --lilac-xl: #f3e8f8;
      --yellow: #f1e8ad;
      --yellow-d: #e0d089;
      --blue: #bfd9ec;
      --blue-d: #8db6d2;
      --ink: #5b3a55;
      /* deep mauve text */
      --ink-soft: #8d6c87;
      --line: #e8c5d8;
      --line-d: #d09abd;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: 'Rubik', system-ui, sans-serif;
      background:
        /* tiny grid */
        linear-gradient(to right, rgba(216, 160, 193, .18) 1px, transparent 1px) 0 0/24px 24px,
        linear-gradient(to bottom, rgba(216, 160, 193, .18) 1px, transparent 1px) 0 0/24px 24px,
        linear-gradient(180deg, #fde4ee 0%, #fbeef5 50%, #f3e1f0 100%);
      color: var(--ink);
      -webkit-font-smoothing: none;
      font-smooth: never;
      image-rendering: pixelated;
      letter-spacing: .2px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    img,
    svg {
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }

    /* ===== PIXEL BORDER MIXIN (via background) =====
   Outer dark line, inner light highlight, hard corners (no border-radius). */
    .pix {
      position: relative;
      background: #fff;
      border: 3px solid var(--ink);
      box-shadow:
        0 0 0 3px var(--pink-l),
        4px 4px 0 0 var(--ink);
      border-radius: 0;
      padding: 14px;
    }

    .pix-pink {
      background: var(--pink-xl);
      box-shadow: 0 0 0 3px var(--pink), 4px 4px 0 0 var(--ink);
    }

    .pix-lilac {
      background: var(--lilac-xl);
      box-shadow: 0 0 0 3px var(--lilac), 4px 4px 0 0 var(--ink);
    }

    .pix-cream {
      background: var(--cream);
      box-shadow: 0 0 0 3px var(--cream-2), 4px 4px 0 0 var(--ink);
    }

    .pix-yellow {
      background: #fbf3c4;
      box-shadow: 0 0 0 3px var(--yellow), 4px 4px 0 0 var(--ink);
    }

    .pix-blue {
      background: #e6f1f8;
      box-shadow: 0 0 0 3px var(--blue), 4px 4px 0 0 var(--ink);
    }

    /* ===== Floating decorations ===== */
    .deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: .85;
    }

    .deco svg {
      display: block;
    }

    /* ===== APP SHELL ===== */
    .app {
      position: relative;
      min-height: 100vh;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 14px 20px 80px;
      zoom: 1.25;
    }

    @media (max-width: 700px) {
      .app {
        zoom: 1;
        padding: 10px 10px 60px;
      }
    }

    .win-bar { flex-wrap: wrap; gap: 4px; }
    .win-bar > div { flex-wrap: wrap; gap: 4px; }

    /* OS-style window header */
    .win {
      background: #fff;
      border: 3px solid var(--ink);
      box-shadow: 0 0 0 3px var(--pink), 5px 5px 0 0 var(--ink);
      margin-bottom: 14px;
    }

    .win-bar {
      background: var(--pink);
      border-bottom: 3px solid var(--ink);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--ink);
      text-shadow: 1px 1px 0 #fff8;
    }

    .win-bar .hearts {
      display: flex;
      gap: 5px
    }

    .win-bar .hearts span {
      width: 9px;
      height: 9px;
      display: block;
      background: #ff7eb3;
      clip-path: polygon(50% 100%, 0 35%, 0 15%, 25% 0, 50% 25%, 75% 0, 100% 15%, 100% 35%);
    }

    .win-bar .hearts span:nth-child(2) {
      background: #ffb1d1
    }

    .win-bar .hearts span:nth-child(3) {
      background: #fff
    }

    .win-bar .ctrl {
      width: 14px;
      height: 14px;
      background: #fff;
      border: 2px solid var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 7px;
      line-height: 1;
    }

    .win-body {
      padding: 14px 14px 16px;
      background: linear-gradient(180deg, #fff 0%, #fff5fa 100%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px
    }

    .brand .bear-sm {
      width: 56px;
      height: 56px;
      flex: none
    }

    .brand .titles {
      flex: 1;
      min-width: 0
    }

    .brand h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: var(--pink-deeper);
      text-shadow: 2px 2px 0 #fff, 3px 3px 0 var(--ink);
      letter-spacing: 0;
      line-height: 1.4;
    }

    .brand p {
      font-size: 15px;
      color: var(--ink-soft);
      margin-top: 6px;
      font-family: 'Rubik', sans-serif;
    }

    .add-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      background: var(--pink);
      color: var(--ink);
      border: 3px solid var(--ink);
      padding: 8px 10px;
      cursor: pointer;
      box-shadow: 3px 3px 0 0 var(--ink);
      text-shadow: 1px 1px 0 #fff8;
      transition: transform .05s, box-shadow .05s;
      white-space: nowrap;
    }

    .add-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 0 var(--ink);
    }

    /* TABS as pixel folder tabs */
    .tabs {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding: 6px 4px 0;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none
    }

    .tab {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 8px 10px;
      background: var(--cream-2);
      color: var(--ink-soft);
      border: 3px solid var(--ink);
      border-bottom: none;
      cursor: pointer;
      white-space: nowrap;
      position: relative;
      top: 3px;
      box-shadow: inset 0 -3px 0 0 rgba(0, 0, 0, .05);
      transition: transform .05s;
    }

    .tab.on {
      background: var(--pink);
      color: var(--ink);
      top: 0;
      box-shadow: inset 0 0 0 2px #fff8;
      text-shadow: 1px 1px 0 #fff8;
    }

    .tab:not(.on):hover {
      background: var(--pink-l);
      color: var(--ink);
    }

    .pane {
      display: none
    }

    .pane.on {
      display: block;
      animation: fade .2s
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(4px)
      }

      to {
        opacity: 1
      }
    }

    /* ===== Cards inside panes ===== */
    .card {
      background: #fff;
      border: 3px solid var(--ink);
      box-shadow: 0 0 0 3px var(--pink-l), 4px 4px 0 0 var(--ink);
      margin: 0 2px 18px 2px;
      padding: 12px 14px;
    }

    .card-cream {
      background: var(--cream);
      box-shadow: 0 0 0 3px var(--cream-2), 4px 4px 0 0 var(--ink);
    }

    .card-lilac {
      background: var(--lilac-xl);
      box-shadow: 0 0 0 3px var(--lilac-l), 4px 4px 0 0 var(--ink);
    }

    .card-pink {
      background: var(--pink-xl);
      box-shadow: 0 0 0 3px var(--pink-l), 4px 4px 0 0 var(--ink);
    }

    .card-blue {
      background: #eaf3fa;
      box-shadow: 0 0 0 3px var(--blue), 4px 4px 0 0 var(--ink);
    }

    .card-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 8.5px;
      color: var(--pink-deeper);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      text-shadow: 1px 1px 0 #fff;
    }

    .card-title::before {
      content: "♡";
      color: var(--pink);
      font-size: 11px
    }

    /* Today hero */
    .today {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .today .bear-md {
      width: 72px;
      height: 72px;
      flex: none
    }

    .today .info {
      flex: 1;
      min-width: 0
    }

    .today .day {
      font-family: 'Press Start 2P', monospace;
      font-size: 18px;
      color: var(--pink-deeper);
      text-shadow: 2px 2px 0 #fff;
      line-height: 1.2;
    }

    .today .wd {
      font-size: 15px;
      color: var(--ink-soft);
      margin-top: 6px;
      text-transform: capitalize
    }

    .today .mins {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--ink);
      margin-top: 8px;
      background: #fff;
      border: 2px solid var(--ink);
      display: inline-block;
      padding: 5px 8px;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat {
      background: #fff;
      border: 3px solid var(--ink);
      box-shadow: 3px 3px 0 0 var(--ink);
      padding: 10px 6px;
      text-align: center;
    }

    .stat:nth-child(1) {
      background: var(--pink-xl)
    }

    .stat:nth-child(2) {
      background: #fbf3c4
    }

    .stat:nth-child(3) {
      background: var(--lilac-xl)
    }

    .stat-n {
      font-family: 'Press Start 2P', monospace;
      font-size: 18px;
      color: var(--pink-deeper);
    }

    .stat-l {
      font-family: 'Press Start 2P', monospace;
      font-size: 6.5px;
      color: var(--ink-soft);
      margin-top: 6px;
    }

    /* Pixel progress bar — square chunks */
    .pw {
      height: 14px;
      background: #fff;
      border: 2px solid var(--ink);
      display: flex;
      padding: 2px;
      gap: 1px;
      overflow: hidden;
    }

    .pb {
      height: 100%;
      background:
        repeating-linear-gradient(90deg, var(--pink) 0 8px, var(--pink-d) 8px 9px);
      transition: width .4s steps(8);
    }

    .plbl {
      font-size: 13px;
      color: var(--ink-soft);
      text-align: right;
      margin-top: 4px;
      font-family: 'Rubik', sans-serif;
    }

    /* Subject group on Today */
    .sg {
      margin-bottom: 12px
    }

    .sgl {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      margin-bottom: 6px;
      background: #fff;
      border: 2px solid var(--ink);
      padding: 5px 7px;
      box-shadow: 2px 2px 0 0 var(--ink);
    }

    .sdot {
      width: 10px;
      height: 10px;
      flex: none;
      border: 2px solid var(--ink)
    }

    .sg .sn {
      flex: 1
    }

    /* Topic row */
    .tr {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 4px;
      border-bottom: 2px dotted var(--line);
      font-size: 15px;
    }

    .tr:last-child {
      border-bottom: none
    }

    .chk {
      width: 18px;
      height: 18px;
      min-width: 18px;
      background: #fff;
      border: 2px solid var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--pink-deeper);
      box-shadow: 2px 2px 0 0 var(--ink);
    }

    .chk.on {
      background: var(--pink);
      color: #fff;
      text-shadow: 1px 1px 0 var(--ink);
    }

    .tn {
      flex: 1;
      font-size: 15px;
      color: var(--ink);
      line-height: 1.3;
    }

    .tn.done {
      text-decoration: line-through;
      color: var(--ink-soft);
      opacity: .7
    }

    .bdg {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      background: #ffd9d9;
      color: #a32d2d;
      border: 2px solid #a32d2d;
      padding: 3px 5px;
      white-space: nowrap;
    }

    /* Section accordion (Mês / Matérias) */
    .ss {
      background: #fff;
      border: 3px solid var(--ink);
      box-shadow: 3px 3px 0 0 var(--ink);
      margin-bottom: 10px;
    }

    .sh {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
      background: linear-gradient(180deg, var(--cream) 0%, var(--cream-2) 100%);
      border-bottom: 2px solid var(--ink);
    }

    .ss .sn {
      flex: 1;
      font-size: 14px;
      font-weight: 600
    }

    .ss .sc {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--ink-soft)
    }

    .chev {
      font-size: 11px;
      color: var(--ink-soft);
      transition: transform .2s
    }

    .ss.op .chev {
      transform: rotate(180deg)
    }

    .sb {
      display: none;
      padding: 10px 12px
    }

    .ss.op .sb {
      display: block
    }

    .ss-prog {
      padding: 6px 12px;
      background: #fffaf3;
      border-bottom: 2px solid var(--ink);
    }

    .ss .pw {
      height: 8px
    }

    /* Pills (filters) */
    .pills {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap
    }

    .pill {
      font-family: 'Press Start 2P', monospace;
      font-size: 7.5px;
      padding: 6px 8px;
      background: #fff;
      color: var(--ink-soft);
      border: 2px solid var(--ink);
      cursor: pointer;
      box-shadow: 2px 2px 0 0 var(--ink);
    }

    .pill.on {
      background: var(--pink);
      color: var(--ink);
      text-shadow: 1px 1px 0 #fff8
    }

    /* Week day card */
    .wd {
      background: #fff;
      border: 3px solid var(--ink);
      box-shadow: 3px 3px 0 0 var(--ink);
      margin-bottom: 10px;
    }

    .wd.today-wd {
      box-shadow: 3px 3px 0 0 var(--pink-deeper);
      background: #fff5fb
    }

    .wh {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--lilac-xl);
      border-bottom: 2px solid var(--ink);
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--ink);
    }

    .wh .wn {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .wdt {
      font-size: 8px;
      color: var(--ink-soft)
    }

    .wch {
      display: flex;
      flex-wrap: wrap;
      padding: 8px 10px;
      gap: 6px;
      min-height: 36px;
      align-items: center
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #fff;
      border: 2px solid var(--ink);
      box-shadow: 2px 2px 0 0 var(--ink);
      text-shadow: 1px 1px 0 rgba(0, 0, 0, .25);
    }

    /* Exam rows */
    .er {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 4px;
      border-bottom: 2px dotted var(--line);
    }

    .er:last-child {
      border-bottom: none
    }

    .dbdg {
      background: var(--pink);
      color: var(--ink);
      border: 2px solid var(--ink);
      padding: 4px 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      text-align: center;
      min-width: 50px;
      line-height: 1.4;
      box-shadow: 2px 2px 0 0 var(--ink);
    }

    /* Buttons */
    .btn {
      font-family: 'Rubik', sans-serif;
      font-weight: 500;
      font-size: 14px;
      padding: 7px 12px;
      background: #fff;
      color: var(--ink);
      border: 2px solid var(--ink);
      cursor: pointer;
      box-shadow: 2px 2px 0 0 var(--ink);
      transition: transform .05s, box-shadow .05s;
    }

    .btn:hover {
      background: var(--pink-xl)
    }

    .btn:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 0 var(--ink)
    }

    .btn-pk {
      background: var(--pink);
      color: var(--ink);
      text-shadow: 1px 1px 0 #fff8
    }

    .btn-pk:hover {
      background: var(--pink-d);
      color: #fff
    }

    .btn-sm {
      padding: 5px 9px;
      font-size: 13px
    }

    .bg {
      background: none;
      border: none;
      color: var(--ink-soft);
      padding: 3px 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }

    .bg:hover {
      color: var(--pink-deeper)
    }

    /* Inputs */
    .inp,
    .sel,
    .ta {
      width: 100%;
      padding: 9px 10px;
      border: 2px solid var(--ink);
      background: #fff;
      color: var(--ink);
      font-family: 'Rubik', sans-serif;
      font-size: 14px;
      outline: none;
      box-shadow: inset 2px 2px 0 0 rgba(0, 0, 0, .06);
    }

    .inp:focus,
    .sel:focus,
    .ta:focus {
      background: #fff5fa;
      box-shadow: inset 2px 2px 0 0 var(--pink-l), 0 0 0 2px var(--pink)
    }

    .ta {
      resize: vertical;
      min-height: 72px
    }

    .fl {
      display: block;
      font-family: 'Press Start 2P', monospace;
      font-size: 7.5px;
      color: var(--pink-deeper);
      margin-bottom: 5px;
    }

    .fg {
      margin-bottom: 11px
    }

    /* Modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(91, 58, 85, .45);
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 50px 14px 40px;
      overflow-y: auto;
    }

    .overlay.hid {
      display: none
    }

    .modal {
      background: #fff;
      border: 3px solid var(--ink);
      box-shadow: 0 0 0 3px var(--pink), 6px 6px 0 0 var(--ink);
      width: 100%;
      max-width: 420px;
    }

    .mhead {
      background: var(--pink);
      border-bottom: 3px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--ink);
      text-shadow: 1px 1px 0 #fff8;
    }

    .mhead .x {
      width: 18px;
      height: 18px;
      background: #fff;
      border: 2px solid var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      line-height: 1;
      color: var(--ink);
    }

    .mbody {
      padding: 14px
    }

    .amb-btns {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .amb-btns .btn {
      font-size: 14px;
      padding: 10px 12px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px
    }

    /* Color swatches */
    .swr {
      display: flex;
      flex-wrap: wrap;
      gap: 7px
    }

    .sw {
      width: 28px;
      height: 28px;
      cursor: pointer;
      border: 2px solid var(--ink);
      box-shadow: 2px 2px 0 0 var(--ink);
      transition: transform .05s;
    }

    .sw.on {
      outline: 3px solid var(--pink);
      transform: translate(-1px, -1px)
    }

    /* Note textarea (day note) styled like sticky pixel paper */
    .nta {
      width: 100%;
      border: 2px solid var(--ink);
      background: #fffce8;
      color: var(--ink);
      padding: 10px;
      font-family: 'Rubik', sans-serif;
      font-size: 14px;
      min-height: 72px;
      resize: vertical;
      outline: none;
      box-shadow: inset 0 -8px 0 0 rgba(231, 193, 142, .25);
    }

    .nta:focus {
      background: #fff8d4
    }

    /* Empty / quote */
    .empty {
      text-align: center;
      padding: 18px;
      color: var(--ink-soft);
      font-size: 14px;
    }

    .qte {
      text-align: center;
      padding: 18px 10px;
      font-size: 14px;
      color: var(--ink-soft);
      font-family: 'Rubik', sans-serif;
      font-style: italic;
    }

    .qte::before {
      content: "♡ "
    }

    .qte::after {
      content: " ♡"
    }

    /* Alert warn */
    .aw {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      background: #fff5cc;
      border: 3px solid #d4a13c;
      box-shadow: 3px 3px 0 0 var(--ink);
      margin-bottom: 12px;
    }

    .aw .at {

          S = { ...S, ...data };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
          enterApp('save carregado ✓', true);

          alert('Arquivo inválido. Tem que ser um .json exportado pelo app.');

      reader.readAsText(file);

    function exportSave() {
      const body = JSON.stringify(S, null, 2);
      const blob = new Blob([body], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const date = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `teba-save-${date}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setSyncLbl('exportado ✓', true);
    }

    function uid() { return 'i' + Date.now() + Math.random().toString(36).slice(2, 5); }

      <div class="sb">`;
        if (pts.length === 0) h += `<div style="font-size:13px;color:var(--ink-soft);padding:4px 0">${fil === 'done' ? 'Nenhum tópico concluído ainda.' : 'Nenhum tópico nesta categoria.'}</div>`;
        else pts.forEach(t => { h += TR(t, 'mes'); });
        h += `</div></div>`;
      });
      el.innerHTML = h;
    }

    function rMaterias() {
      const el = document.getElementById('p-materias');
      let h = `<div class="card card-lilac" style="display:flex;gap:12px;align-items:center">
    <div style="flex:none">${bearSvg(56)}</div>
    <div style="flex:1">
      <div class="row-between" style="margin:0">
        <span class="label">Suas matérias ♡</span>
        <button class="btn btn-pk btn-sm" onclick="oM('asub')">＋ NOVA</button>
      </div>
    </div>
  </div>`;
      S.subjects.forEach(s => {
        const pts = S.topics.filter(t => t.sId === s.id);
        const dn = pts.filter(t => t.st === 'done').length, pc = pts.length > 0 ? Math.round(dn / pts.length * 100) : 0;
        h += `<div class="ss" id="ms-${s.id}">
      <div class="sh" onclick="togSec('ms-${s.id}')">
        <div class="sdot" style="background:${s.color}"></div>
        <span class="sn">${s.emoji} ${s.name}</span>
        <span class="sc">${pts.length} TÓP.</span>
        <span class="chev">▾</span>
      </div>
      <div class="ss-prog"><div class="pw"><div class="pb" style="width:${pc}%"></div></div></div>
      <div class="sb">
        <div style="display:flex;gap:6px;margin-bottom:9px">
          <button class="btn btn-sm" onclick="oTopicFor('${s.id}')">＋ TÓPICO</button>
          <button class="btn btn-sm" style="color:#a32d2d" onclick="delSub('${s.id}')">EXCLUIR</button>
        </div>`;
        if (pts.length === 0) h += `<div style="font-size:13px;color:var(--ink-soft)">nenhum tópico ainda. adicione! ✿</div>`;
        else pts.forEach(t => { h += `<div class="tr"><div class="chk${t.st === 'done' ? ' on' : ''}" onclick="togT('${t.id}','materias')">${t.st === 'done' ? '✓' : ''}</div><span class="tn${t.st === 'done' ? ' done' : ''}">${t.name}</span><button class="bg" onclick="delTopic('${t.id}')">×</button></div>`; });
        h += `</div></div>`;
      });
      el.innerHTML = h;
    }

    function rAgenda() {
      const el = document.getElementById('p-agenda');
      const exams = S.exams.filter(e => !e.done).sort((a, b) => a.date.localeCompare(b.date));
      const tasks = S.tasks.filter(t => !t.done).sort((a, b) => (a.date || '9999').localeCompare(b.date || '9999'));
      let h = `<div class="card card-cream" style="display:flex;gap:12px;align-items:center">
    <div style="flex:none">${bearSvg(56)}</div>
    <div style="flex:1">
      <div class="card-title" style="margin-bottom:8px">Sua agenda ✿</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-pk btn-sm" onclick="oM('aexam')">＋ PROVA</button>
        <button class="btn btn-sm" onclick="oM('atask')">＋ TAREFA</button>
        <button class="btn btn-sm" onclick="oM('asess')">＋ SESSÃO</button>
      </div>
    </div>
  </div>`;
      h += `<div class="card card-pink"><div class="card-title">Provas agendadas</div>`;
      if (exams.length === 0) h += `<div class="empty">nenhuma prova agendada! ♡</div>`;
      else exams.forEach(e => {
        const sb = sub(e.subjectId), df = ddiff(e.date);
        const lbl = df < 0 ? `${Math.abs(df)}D ATRÁS` : df === 0 ? 'HOJE' : df === 1 ? 'AMANHÃ' : `EM ${df}D`;
        h += `<div class="er"><div class="dbdg">${fdate(e.date)}<br><span style="font-size:6px">${lbl}</span></div><div style="flex:1"><div style="font-size:14px;font-weight:600">${e.title}</div>${sb.name ? `<div style="font-size:12px;color:var(--ink-soft)">${sb.emoji} ${sb.name}</div>` : ''}</div><button class="bg" onclick="togExam('${e.id}')">✓</button><button class="bg" onclick="delExam('${e.id}')">×</button></div>`;
      });
      h += `</div><div class="card"><div class="card-title">Tarefas</div>`;
      if (tasks.length === 0) h += `<div class="empty">nenhuma tarefa pendente! ✿</div>`;
      else tasks.forEach(t => {
        const sb = t.sId ? sub(t.sId) : null;
        h += `<div class="tr"><div class="chk" onclick="togTask('${t.id}')"></div><span class="tn">${t.title}${t.date ? ` <span style="font-size:12px;color:var(--ink-soft)">${fdate(t.date)}</span>` : ''}</span>${sb ? `<span style="font-size:14px">${sb.emoji}</span>` : ''}<button class="bg" onclick="delTask('${t.id}')">×</button></div>`;
      });
      h += `</div>`;
      const allSess = [...S.sessions].reverse();
      h += `<div class="card card-lilac"><div class="card-title">Sessões de estudo (${allSess.length})</div>`;
      if (allSess.length === 0) h += `<div class="empty">nenhuma sessão registrada ainda.</div>`;
      else allSess.forEach(s => {
        const sb = sub(s.sId);
        h += `<div class="tr"><span style="font-size:18px">${sb.emoji || '📖'}</span><div style="flex:1"><div style="font-size:14px;font-weight:600">${sb.name || '?'} — ${s.mins} min</div>${s.notes ? `<div style="font-size:12px;color:var(--ink-soft)">${s.notes}</div>` : ''}<div style="font-size:11px;color:var(--ink-soft);font-family:'Press Start 2P',monospace">${fdate(s.date)}</div></div><button class="bg" onclick="editSess('${s.id}')" title="Editar">✎</button><button class="bg" onclick="delSess('${s.id}')" title="Excluir">×</button></div>`;
      });
      h += `</div>`;
      el.innerHTML = h;
    }

    // Actions
    function togT(id, src) {
      const t = S.topics.find(t => t.id === id); if (!t) return;
      t.st = t.st === 'done' ? 'pending' : 'done'; save();
      if (src === 'hoje') rHoje(); else if (src === 'mes') rMes(); else if (src === 'materias') rMaterias();
      if (document.getElementById('p-semana').classList.contains('on')) rSemana();
    }
    function togTask(id) { const t = S.tasks.find(t => t.id === id); if (!t) return; t.done = !t.done; save(); rHoje(); if (document.getElementById('p-agenda').classList.contains('on')) rAgenda(); }
    function delTask(id) { S.tasks = S.tasks.filter(t => t.id !== id); save(); rHoje(); if (document.getElementById('p-agenda').classList.contains('on')) rAgenda(); }
    function togExam(id) { const e = S.exams.find(e => e.id === id); if (!e) return; e.done = !e.done; save(); rAgenda(); rHoje(); }
    function delExam(id) { S.exams = S.exams.filter(e => e.id !== id); save(); rAgenda(); rHoje(); }
    function delTopic(id) { S.topics = S.topics.filter(t => t.id !== id); save(); rMaterias(); rMes(); }
    function delSess(id) { if (!confirm('Excluir esta sessão?')) return; S.sessions = S.sessions.filter(s => s.id !== id); save(); rAgenda(); rHoje(); }
    function editSess(id) {
      const s = S.sessions.find(s => s.id === id); if (!s) return;
      oM('asess');
      setTimeout(() => {
        popSubs();
        const ss = document.getElementById('ss-s'), sm = document.getElementById('ss-m'), so = document.getElementById('ss-o');
        if (ss) ss.value = s.sId; if (sm) sm.value = s.mins; if (so) so.value = s.notes || '';
        window._editSessId = id;
        const btn = document.querySelector('#m-asess .btn-pk');
        if (btn) { btn.textContent = 'SALVAR'; btn.onclick = saveSessEdit; }
      }, 60);
    }
    function saveSessEdit() {
      const id = window._editSessId; if (!id) return;
      const s = S.sessions.find(s => s.id === id); if (!s) return;
      const sId = document.getElementById('ss-s')?.value, mins = parseInt(document.getElementById('ss-m')?.value), notes = document.getElementById('ss-o')?.value.trim();
      if (!sId || !mins) { alert('Preencha matéria e duração!'); return; }
      s.sId = sId; s.mins = mins; s.notes = notes; save();
      window._editSessId = null;
      const btn = document.querySelector('#m-asess .btn-pk');
      if (btn) { btn.textContent = '＋ REGISTRAR'; btn.onclick = addSess; }
      cM('asess'); rAgenda(); rHoje();
    }
    function delSub(id) { if (!confirm('Excluir esta matéria e todos seus tópicos?')) return; S.subjects = S.subjects.filter(s => s.id !== id); S.topics = S.topics.filter(t => t.sId !== id); save(); rMaterias(); }
    function saveNote() { const v = document.getElementById('dn')?.value || ''; S.notes[tStr()] = v; save(); }
    function setMF(f) { window._mf = f; rMes(); }
    function togSec(id) { document.getElementById(id)?.classList.toggle('op'); }
    function oTopicFor(sId) { oM('atopic'); setTimeout(() => { const el = document.getElementById('tp-s'); if (el) el.value = sId; }, 60); }

    // Modals
    function oM(name) {
      document.getElementById(`m-${name}`).classList.remove('hid');
      if (['atopic', 'atask', 'aexam', 'asess'].includes(name)) popSubs();
      if (name === 'asub') drawSw();
    }
    function cM(name) { document.getElementById(`m-${name}`).classList.add('hid'); }
    function popSubs() {
      const opts = S.subjects.map(s => `<option value="${s.id}">${s.emoji} ${s.name}</option>`).join('');
      const optsc = `<option value="">— Sem matéria —</option>` + opts;
      ['tp-s', 'ex-s', 'ss-s'].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = opts; });
      const tk = document.getElementById('tk-s'); if (tk) tk.innerHTML = optsc;
    }
    function drawSw() {
      const el = document.getElementById('col-sw'); if (!el) return;
      el.innerHTML = COLS.map(c => `<div class="sw${S.sc === c ? ' on' : ''}" style="background:${c}" onclick="selC('${c}')"></div>`).join('');
    }
    function selC(c) { S.sc = c; drawSw(); }

    function addTopic() {
      const sId = document.getElementById('tp-s')?.value, name = document.getElementById('tp-n')?.value.trim(), p = document.getElementById('tp-p')?.value || 'month';
      if (!name || !sId) { alert('Preencha todos os campos!'); return; }
      S.topics.push({ id: uid(), sId, name, st: 'pending', p }); save();
      document.getElementById('tp-n').value = ''; cM('atopic'); rMes(); rMaterias(); rHoje();
    }
    function addTask() {
      const title = document.getElementById('tk-n')?.value.trim(), date = document.getElementById('tk-d')?.value || null, sId = document.getElementById('tk-s')?.value || null;
      if (!title) { alert('Descreva a tarefa!'); return; }
      S.tasks.push({ id: uid(), title, date, sId, done: false }); save();
      document.getElementById('tk-n').value = ''; document.getElementById('tk-d').value = '';
      cM('atask'); rHoje(); if (document.getElementById('p-agenda').classList.contains('on')) rAgenda();
    }
    function addExam() {
      const title = document.getElementById('ex-n')?.value.trim(), subjectId = document.getElementById('ex-s')?.value, date = document.getElementById('ex-d')?.value;
      if (!title || !date) { alert('Preencha nome e data!'); return; }
      S.exams.push({ id: uid(), title, subjectId, date, done: false }); save();
      document.getElementById('ex-n').value = ''; document.getElementById('ex-d').value = '';
      cM('aexam'); rHoje(); if (document.getElementById('p-agenda').classList.contains('on')) rAgenda();
    }
    function addSess() {
      const sId = document.getElementById('ss-s')?.value, mins = parseInt(document.getElementById('ss-m')?.value), notes = document.getElementById('ss-o')?.value.trim();
      if (!sId || !mins) { alert('Preencha matéria e duração!'); return; }
      S.sessions.push({ id: uid(), sId, mins, notes, date: tStr() }); save();
      document.getElementById('ss-m').value = ''; document.getElementById('ss-o').value = '';
      cM('asess'); rHoje(); if (document.getElementById('p-agenda').classList.contains('on')) rAgenda();
    }
    function addSub() {
      const name = document.getElementById('sb-n')?.value.trim(), emoji = document.getElementById('sb-e')?.value.trim() || '📖';
      if (!name) { alert('Digite o nome da matéria!'); return; }
      S.subjects.push({ id: uid(), name, emoji, color: S.sc || COLS[0] }); save();
      document.getElementById('sb-n').value = ''; document.getElementById('sb-e').value = '';
      cM('asub'); rMaterias();
    }

    document.querySelectorAll('.overlay').forEach(o => { o.addEventListener('click', e => { if (e.target === o) o.classList.add('hid'); }); });
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
        btn.classList.add('on');
        const t = btn.dataset.t;
        document.getElementById(`p-${t}`).classList.add('on');
        if (t === 'hoje') rHoje(); else if (t === 'semana') rSemana(); else if (t === 'mes') rMes(); else if (t === 'materias') rMaterias(); else if (t === 'agenda') rAgenda();
      });
    });

    document.getElementById('lb-bear').innerHTML = bearSvg(72);
  </script>
</body>

</html>
